<!DOCTYPE html>

<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Migracja — Warsztat Pisarki</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Crimson+Pro:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #1a1208;
    --parchment: #f5efe3;
    --sand: #e8dcc8;
    --terracotta: #c4622d;
    --deep-sea: #2c4a6e;
    --gold: #b8952a;
    --mist: #8a9bb0;
    --faded: #6b5c45;
    --border: rgba(184, 149, 42, 0.3);
  }

- { margin: 0; padding: 0; box-sizing: border-box; }

body {
background: var(–ink);
color: var(–parchment);
font-family: ‘Crimson Pro’, serif;
font-size: 18px;
min-height: 100vh;
overflow-x: hidden;
}

/* Map-like background */
body::before {
content: ‘’;
position: fixed;
inset: 0;
background:
radial-gradient(ellipse at 20% 30%, rgba(44, 74, 110, 0.4) 0%, transparent 50%),
radial-gradient(ellipse at 80% 70%, rgba(196, 98, 45, 0.25) 0%, transparent 50%),
radial-gradient(ellipse at 50% 50%, rgba(26, 18, 8, 0.8) 0%, transparent 100%);
z-index: 0;
pointer-events: none;
}

/* Subtle grid pattern */
body::after {
content: ‘’;
position: fixed;
inset: 0;
background-image:
linear-gradient(rgba(184,149,42,0.04) 1px, transparent 1px),
linear-gradient(90deg, rgba(184,149,42,0.04) 1px, transparent 1px);
background-size: 60px 60px;
z-index: 0;
pointer-events: none;
}

.container {
position: relative;
z-index: 1;
max-width: 900px;
margin: 0 auto;
padding: 60px 30px 100px;
}

/* Header */
header {
text-align: center;
margin-bottom: 70px;
position: relative;
}

.compass-decoration {
font-size: 28px;
color: var(–gold);
opacity: 0.6;
letter-spacing: 20px;
margin-bottom: 20px;
animation: pulse-fade 4s ease-in-out infinite;
}

@keyframes pulse-fade {
0%, 100% { opacity: 0.4; }
50% { opacity: 0.9; }
}

h1 {
font-family: ‘Playfair Display’, serif;
font-size: clamp(2.8rem, 6vw, 4.5rem);
font-weight: 400;
letter-spacing: -0.5px;
color: var(–parchment);
line-height: 1.1;
margin-bottom: 12px;
}

h1 em {
font-style: italic;
color: var(–gold);
}

.subtitle {
color: var(–mist);
font-size: 1rem;
letter-spacing: 3px;
text-transform: uppercase;
font-weight: 300;
margin-top: 16px;
}

.divider {
width: 120px;
height: 1px;
background: linear-gradient(90deg, transparent, var(–gold), transparent);
margin: 24px auto;
}

/* Genre Grid */
.section-title {
font-family: ‘Playfair Display’, serif;
font-size: 0.75rem;
letter-spacing: 4px;
text-transform: uppercase;
color: var(–gold);
opacity: 0.8;
margin-bottom: 20px;
padding-left: 2px;
}

.genres-grid {
display: grid;
grid-template-columns: repeat(auto-fill, minmax(155px, 1fr));
gap: 10px;
margin-bottom: 50px;
}

.genre-btn {
background: rgba(245, 239, 227, 0.04);
border: 1px solid var(–border);
color: var(–sand);
font-family: ‘Crimson Pro’, serif;
font-size: 0.95rem;
padding: 12px 14px;
cursor: pointer;
transition: all 0.3s ease;
text-align: left;
position: relative;
overflow: hidden;
border-radius: 2px;
}

.genre-btn .genre-icon {
display: block;
font-size: 1.4rem;
margin-bottom: 5px;
opacity: 0.8;
}

.genre-btn .genre-label {
display: block;
font-size: 0.85rem;
letter-spacing: 0.5px;
}

.genre-btn::before {
content: ‘’;
position: absolute;
inset: 0;
background: linear-gradient(135deg, rgba(184,149,42,0.12), transparent);
opacity: 0;
transition: opacity 0.3s;
}

.genre-btn:hover::before, .genre-btn.active::before { opacity: 1; }

.genre-btn:hover {
border-color: rgba(184,149,42,0.7);
color: var(–parchment);
transform: translateY(-2px);
}

.genre-btn.active {
border-color: var(–gold);
color: var(–parchment);
background: rgba(184,149,42,0.1);
}

.genre-btn.active .genre-icon { opacity: 1; }

/* Controls */
.controls-row {
display: flex;
gap: 16px;
margin-bottom: 50px;
flex-wrap: wrap;
align-items: flex-end;
}

.control-group {
flex: 1;
min-width: 180px;
}

.control-group label {
display: block;
font-size: 0.7rem;
letter-spacing: 3px;
text-transform: uppercase;
color: var(–gold);
opacity: 0.7;
margin-bottom: 8px;
}

.control-group select {
width: 100%;
background: rgba(245,239,227,0.04);
border: 1px solid var(–border);
color: var(–sand);
font-family: ‘Crimson Pro’, serif;
font-size: 1rem;
padding: 10px 14px;
cursor: pointer;
appearance: none;
border-radius: 2px;
transition: border-color 0.3s;
}

.control-group select:focus {
outline: none;
border-color: rgba(184,149,42,0.6);
}

.control-group select option {
background: #1a1208;
color: var(–parchment);
}

/* Main generate button */
.generate-btn {
background: transparent;
border: 2px solid var(–terracotta);
color: var(–parchment);
font-family: ‘Playfair Display’, serif;
font-size: 1.1rem;
font-style: italic;
padding: 14px 36px;
cursor: pointer;
transition: all 0.4s ease;
white-space: nowrap;
position: relative;
overflow: hidden;
border-radius: 2px;
align-self: flex-end;
}

.generate-btn::before {
content: ‘’;
position: absolute;
inset: 0;
background: var(–terracotta);
transform: translateX(-100%);
transition: transform 0.35s ease;
z-index: -1;
}

.generate-btn:hover::before { transform: translateX(0); }
.generate-btn:hover { color: white; }
.generate-btn:disabled { opacity: 0.4; cursor: not-allowed; }
.generate-btn:disabled::before { display: none; }

/* Result area */
.result-area {
min-height: 200px;
position: relative;
}

.result-card {
background: rgba(245, 239, 227, 0.04);
border: 1px solid var(–border);
border-left: 3px solid var(–terracotta);
padding: 40px;
border-radius: 2px;
animation: fade-in-up 0.6s ease forwards;
position: relative;
}

@keyframes fade-in-up {
from { opacity: 0; transform: translateY(16px); }
to { opacity: 1; transform: translateY(0); }
}

.result-card .genre-tag {
font-size: 0.65rem;
letter-spacing: 3px;
text-transform: uppercase;
color: var(–terracotta);
margin-bottom: 18px;
display: flex;
align-items: center;
gap: 10px;
}

.result-card .genre-tag::after {
content: ‘’;
flex: 1;
height: 1px;
background: var(–border);
max-width: 80px;
}

.result-title {
font-family: ‘Playfair Display’, serif;
font-size: 1.6rem;
font-weight: 700;
color: var(–parchment);
margin-bottom: 20px;
line-height: 1.3;
}

.result-body {
color: var(–sand);
font-size: 1.05rem;
line-height: 1.8;
font-weight: 300;
}

.result-body p { margin-bottom: 14px; }
.result-body p:last-child { margin-bottom: 0; }

.result-body strong {
color: var(–parchment);
font-weight: 400;
}

/* Characters section within result */
.characters-hint {
margin-top: 24px;
padding-top: 20px;
border-top: 1px solid rgba(184,149,42,0.2);
display: grid;
grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
gap: 12px;
}

.character-pill {
background: rgba(44, 74, 110, 0.25);
border: 1px solid rgba(44,74,110,0.4);
border-radius: 2px;
padding: 10px 14px;
font-size: 0.85rem;
color: var(–mist);
font-style: italic;
}

/* Loading state */
.loading-state {
display: flex;
align-items: center;
justify-content: center;
gap: 14px;
padding: 60px 0;
color: var(–mist);
font-style: italic;
}

.loading-dots {
display: flex;
gap: 6px;
}

.loading-dots span {
width: 6px;
height: 6px;
border-radius: 50%;
background: var(–gold);
animation: dot-pulse 1.4s ease-in-out infinite;
}

.loading-dots span:nth-child(2) { animation-delay: 0.2s; }
.loading-dots span:nth-child(3) { animation-delay: 0.4s; }

@keyframes dot-pulse {
0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; }
40% { transform: scale(1); opacity: 1; }
}

/* History */
.history-section {
margin-top: 60px;
padding-top: 40px;
border-top: 1px solid rgba(184,149,42,0.15);
}

.history-title {
font-size: 0.7rem;
letter-spacing: 4px;
text-transform: uppercase;
color: var(–faded);
margin-bottom: 20px;
}

.history-list {
display: flex;
flex-direction: column;
gap: 8px;
}

.history-item {
background: rgba(245,239,227,0.02);
border: 1px solid rgba(184,149,42,0.12);
padding: 12px 18px;
font-size: 0.9rem;
color: var(–faded);
cursor: pointer;
transition: all 0.25s;
border-radius: 2px;
display: flex;
justify-content: space-between;
align-items: center;
}

.history-item:hover {
background: rgba(245,239,227,0.05);
color: var(–sand);
border-color: rgba(184,149,42,0.3);
}

.history-item .hist-genre {
font-size: 0.7rem;
letter-spacing: 2px;
text-transform: uppercase;
color: var(–terracotta);
opacity: 0.7;
flex-shrink: 0;
margin-left: 12px;
}

/* Empty state */
.empty-state {
text-align: center;
padding: 80px 20px;
color: var(–faded);
}

.empty-state .big-char {
font-size: 3rem;
margin-bottom: 16px;
opacity: 0.4;
}

.empty-state p {
font-style: italic;
font-size: 1.05rem;
}

/* Error */
.error-state {
background: rgba(196, 98, 45, 0.08);
border: 1px solid rgba(196, 98, 45, 0.3);
padding: 24px;
color: #e8a07a;
font-style: italic;
border-radius: 2px;
}

/* Scrollbar */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: var(–ink); }
::-webkit-scrollbar-thumb { background: rgba(184,149,42,0.3); border-radius: 3px; }

@media (max-width: 600px) {
.container { padding: 40px 20px 80px; }
h1 { font-size: 2.4rem; }
.genres-grid { grid-template-columns: repeat(3, 1fr); }
.controls-row { flex-direction: column; }
.generate-btn { width: 100%; text-align: center; }
}
</style>

</head>
<body>
<div class="container">

  <header>
    <div class="compass-decoration">✦ ✦ ✦</div>
    <h1>Migracja<br><em>Warsztat Pisarki</em></h1>
    <div class="divider"></div>
    <p class="subtitle">Generator pomysłów na wątki fabularne</p>
  </header>

  <!-- Genre selection -->

  <div class="section-title">Wybierz gatunek literacki</div>
  <div class="genres-grid" id="genresGrid">
    <button class="genre-btn" data-genre="kryminalny">
      <span class="genre-icon">🔍</span>
      <span class="genre-label">Kryminalny</span>
    </button>
    <button class="genre-btn" data-genre="thriller">
      <span class="genre-icon">⚡</span>
      <span class="genre-label">Thriller</span>
    </button>
    <button class="genre-btn" data-genre="dramat">
      <span class="genre-icon">🎭</span>
      <span class="genre-label">Dramat</span>
    </button>
    <button class="genre-btn" data-genre="miłosny">
      <span class="genre-icon">♥</span>
      <span class="genre-label">Romans</span>
    </button>
    <button class="genre-btn" data-genre="historyczny">
      <span class="genre-icon">⚔️</span>
      <span class="genre-label">Historyczny</span>
    </button>
    <button class="genre-btn" data-genre="obyczajowy">
      <span class="genre-icon">🌿</span>
      <span class="genre-label">Obyczajowy</span>
    </button>
    <button class="genre-btn" data-genre="polityczny">
      <span class="genre-icon">🗺️</span>
      <span class="genre-label">Polityczny</span>
    </button>
    <button class="genre-btn" data-genre="psychologiczny">
      <span class="genre-icon">🧠</span>
      <span class="genre-label">Psychologiczny</span>
    </button>
    <button class="genre-btn" data-genre="magiczny realizm">
      <span class="genre-icon">✨</span>
      <span class="genre-label">Realizm magiczny</span>
    </button>
  </div>

  <!-- Controls -->

  <div class="controls-row">
    <div class="control-group">
      <label>Kontynent / region</label>
      <select id="regionSelect">
        <option value="dowolny">— dowolny —</option>
        <option value="Europa Wschodnia">Europa Wschodnia</option>
        <option value="Bliski Wschód">Bliski Wschód</option>
        <option value="Afryka Subsaharyjska">Afryka Subsaharyjska</option>
        <option value="Ameryka Łacińska">Ameryka Łacińska</option>
        <option value="Azja Południowo-Wschodnia">Azja Płd.-Wschodnia</option>
        <option value="Europa Zachodnia">Europa Zachodnia</option>
        <option value="Stany Zjednoczone">Stany Zjednoczone</option>
        <option value="Australia / Oceania">Australia / Oceania</option>
      </select>
    </div>
    <div class="control-group">
      <label>Epoka</label>
      <select id="eraSelect">
        <option value="współczesna">Współczesna</option>
        <option value="lata 70.–90. XX w.">Lata 70.–90. XX w.</option>
        <option value="I połowa XX w.">I połowa XX w.</option>
        <option value="XIX wiek">XIX wiek</option>
        <option value="nieokreślona">Nieokreślona</option>
      </select>
    </div>
    <div class="control-group">
      <label>Perspektywa</label>
      <select id="perspectiveSelect">
        <option value="dorosły migrant">Dorosły migrant</option>
        <option value="dziecko migranta">Dziecko migranta</option>
        <option value="drugie pokolenie">Drugie pokolenie</option>
        <option value="pracownik granicy">Pracownik granicy</option>
        <option value="obywatel kraju przyjmującego">Obywatel kraju przyjmującego</option>
        <option value="migrant powracający">Powracający migrant</option>
      </select>
    </div>
    <button class="generate-btn" id="generateBtn" disabled>
      Rozwiń wątek →
    </button>
  </div>

  <!-- Result -->

  <div class="result-area" id="resultArea">
    <div class="empty-state">
      <div class="big-char">🧭</div>
      <p>Wybierz gatunek, by wygenerować inspirację na wątek fabularny</p>
    </div>
  </div>

  <!-- History -->

  <div class="history-section" id="historySection" style="display:none">
    <div class="history-title">Wcześniejsze pomysły</div>
    <div class="history-list" id="historyList"></div>
  </div>

</div>

<script>
  const API_URL = "https://api.anthropic.com/v1/messages";
  const API_KEY = "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";
  let selectedGenre = null;
  let history = [];

  // Genre selection
  document.querySelectorAll('.genre-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.genre-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      selectedGenre = btn.dataset.genre;
      document.getElementById('generateBtn').disabled = false;
    });
  });

  // Generate
  document.getElementById('generateBtn').addEventListener('click', generateIdea);

  async function generateIdea() {
    const genre = selectedGenre;
    const region = document.getElementById('regionSelect').value;
    const era = document.getElementById('eraSelect').value;
    const perspective = document.getElementById('perspectiveSelect').value;

    const btn = document.getElementById('generateBtn');
    btn.disabled = true;
    btn.textContent = 'Piszę...';

    showLoading();

    const regionText = region !== 'dowolny' ? `Region: ${region}.` : '';
    const prompt = `Jesteś kreatywnym asystentem pisarki, która pisze literacką książkę o różnych doświadczeniach migracji. 
    
Stwórz inspirację na ORYGINALNY, NIEOCZYWISTY wątek fabularny w gatunku: **${genre}**, osadzony w kontekście migracji.

Parametry:
- Gatunek: ${genre}
- ${regionText}
- Epoka: ${era}
- Perspektywa narracyjna: ${perspective}

Odpowiedz w formacie JSON (TYLKO JSON, bez żadnego dodatkowego tekstu, bez markdown backticks):
{
  "tytul": "Tytuł / nazwa wątku (krótka, poetycka)",
  "streszczenie": "3-4 zdania opisujące serce wątku – co się dzieje, jaki konflikt, jaka stawka emocjonalna",
  "twist": "Nieoczywisty element, niespodziewany zwrot lub motyw, który czyni ten wątek wyjątkowym",
  "pytania": "2-3 pytania, które ten wątek zadaje czytelnikowi (filozoficzne, moralne, egzystencjalne)",
  "postacie": ["krótki opis postaci 1", "krótki opis postaci 2", "krótki opis postaci 3"]
}`;

    try {
      const response = await fetch(API_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json", "x-api-key": API_KEY, "anthropic-version": "2023-06-01", "anthropic-dangerous-direct-browser-access": "true" },
        body: JSON.stringify({
          model: "claude-sonnet-4-20250514",
          max_tokens: 1000,
          messages: [{ role: "user", content: prompt }]
        })
      });

      const data = await response.json();
      const text = data.content?.map(i => i.text || "").join("") || "";
      const clean = text.replace(/```json|```/g, "").trim();
      const idea = JSON.parse(clean);

      showResult(idea, genre);
      addToHistory(idea.tytul, genre);

    } catch (err) {
      showError();
    }

    btn.disabled = false;
    btn.textContent = 'Rozwiń wątek →';
  }

  function showLoading() {
    document.getElementById('resultArea').innerHTML = `
      <div class="loading-state">
        <div class="loading-dots">
          <span></span><span></span><span></span>
        </div>
        <span>Snuję wątek...</span>
      </div>`;
  }

  function showResult(idea, genre) {
    const characters = (idea.postacie || []).map(p =>
      `<div class="character-pill">${p}</div>`
    ).join('');

    document.getElementById('resultArea').innerHTML = `
      <div class="result-card">
        <div class="genre-tag">${genre}</div>
        <div class="result-title">${idea.tytul}</div>
        <div class="result-body">
          <p>${idea.streszczenie}</p>
          <p><strong>Klucz narracyjny:</strong> ${idea.twist}</p>
          <p><strong>Pytania, które niesie:</strong> ${idea.pytania}</p>
        </div>
        ${characters ? `<div class="characters-hint">${characters}</div>` : ''}
      </div>`;
  }

  function showError() {
    document.getElementById('resultArea').innerHTML = `
      <div class="error-state">
        Nie udało się wygenerować pomysłu. Sprawdź połączenie z API i spróbuj ponownie.
      </div>`;
  }

  function addToHistory(title, genre) {
    history.unshift({ title, genre });
    if (history.length > 8) history = history.slice(0, 8);
    renderHistory();
  }

  function renderHistory() {
    const section = document.getElementById('historySection');
    const list = document.getElementById('historyList');
    if (history.length === 0) { section.style.display = 'none'; return; }
    section.style.display = 'block';
    list.innerHTML = history.map((item, i) => `
      <div class="history-item">
        <span>${item.title}</span>
        <span class="hist-genre">${item.genre}</span>
      </div>
    `).join('');
  }
</script>

</body>
</html>
